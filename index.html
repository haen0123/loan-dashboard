<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>부채 상환 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0A12; color: #E8E6F0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: #2A2A3A; border-radius: 99px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #7C6AF7; border-radius: 50%; cursor: pointer; box-shadow: 0 0 6px #7C6AF788; }
  select, input { outline: none; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #141428; }
  ::-webkit-scrollbar-thumb { background: #3A3A52; border-radius: 99px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ── 상수 ──
const CHEON_MONTHLY_INTEREST = 23602;
const CHEON_ORIGIN = 7000000;
const CURRENT_CARD_BAL = 14016759;

const PAST_RECORDS = [
  { id:"past-1", label:"2026년 2월",
    events:[
      { desc:"카드론 0회차 (대량 중도상환)", principalCard:17000000, interestCard:207958, note:"원금잔액 30,000,000원" },
      { desc:"적금 담보 대출 상환", principalOther:10000000, interestOther:0, note:"도약 적금 질권 해지" },
    ], cardBalAfter:30000000, cheonBalAfter:CHEON_ORIGIN, cheonInterest:0 },
  { id:"past-2", label:"2026년 3월",
    events:[
      { desc:"카드론 1회차 정기 상환", principalCard:15788362, interestCard:338196, note:"원금잔액 14,211,638원" },
      { desc:"카드론 추가 원금 상환 1차", principalCard:9000000, interestCard:0, note:"여유자금 400만" },
      { desc:"카드론 추가 원금 상환 2차", principalCard:2000000, interestCard:0, note:"여유자금 200만" },
    ], cardBalAfter:14211638, cheonBalAfter:CHEON_ORIGIN, cheonInterest:CHEON_MONTHLY_INTEREST },
  { id:"past-3", label:"2026년 3~4월 경계",
    events:[
      { desc:"카드론 추가 원금 상환 (하나 250만)", principalCard:2500000, interestCard:0, note:"원금잔액 16,207,864원" },
    ], cardBalAfter:16207864, cheonBalAfter:CHEON_ORIGIN, cheonInterest:0 },
  { id:"past-4", label:"2026년 4월",
    events:[
      { desc:"카드론 2회차 정기 원리금", principalCard:194879, interestCard:29786, note:"합계 224,665원" },
      { desc:"카드론 추가 원금 상환", principalCard:2000000, interestCard:0, note:"여유자금 0" },
    ], cardBalAfter:14016759, cheonBalAfter:CHEON_ORIGIN, cheonInterest:CHEON_MONTHLY_INTEREST },
];

const INITIAL_PLAN = [
  { id:"p-now-1",    label:"5월",       event:"월 상환 시작 (현재)",                         type:"now",    addedAt:"2026-04" },
  { id:"p-check-1",  label:"7월",       event:"신용등급 확인 (5 → 4등급 목표)",               type:"check",  addedAt:"2026-04" },
  { id:"p-action-1", label:"8월",       event:"우리은행 직장인 대출 상담 (6.5% 이하 시 대환)", type:"action", addedAt:"2026-04" },
  { id:"p-action-2", label:"11~12월",   event:"연금저축 300만원 납입 (세액공제)",              type:"action", addedAt:"2026-04" },
  { id:"p-goal-1",   label:"12월",      event:"카드론 완전 상환 목표 (월 178만↑ 유지 시)",     type:"goal",   addedAt:"2026-04" },
  { id:"p-goal-2",   label:"2027 상반기", event:"청약예금 대출 700만원 상환",                  type:"goal",   addedAt:"2026-04" },
  { id:"p-future-1", label:"2027 하반기", event:"전세대출 준비",                              type:"future", addedAt:"2026-04" },
];

const TARGET_MONTH_OPTIONS = Array.from({ length:28 }, (_,i) => {
  const d = new Date(2026, 4+i, 1);
  const y = d.getFullYear(), m = d.getMonth()+1;
  const val = `${y}-${String(m).padStart(2,"0")}`;
  const months = i+1;
  return { value:val, label:`${y}년 ${m}월 (${months}개월)` };
});

const MONTH_OPTIONS = Array.from({ length:30 }, (_,i) => {
  const d = new Date(2026, 4+i, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
});

const colorMap = { now:"#7C6AF7", check:"#F9C74F", action:"#4ECDC4", goal:"#FF6B6B", future:"#555370" };
const badgeMap = { now:"현재", check:"확인", action:"액션", goal:"목표", future:"미래" };
const EMPTY_FORM = { month:"2026-05", cardPrincipal:"", cardInterest:"", cheonPrincipal:"", cheonInterest:"", note:"" };

function fmt(n) { return `${Math.round(n).toLocaleString()}원`; }
function fmtM(m) { if(!m) return ""; const [y,mo]=m.split("-"); return `${y}년 ${parseInt(mo)}월`; }
function monthDiff(from,to) { const [fy,fm]=from.split("-").map(Number), [ty,tm]=to.split("-").map(Number); return (ty-fy)*12+(tm-fm); }
function monthsToComplete(bal,monthly) {
  if(monthly<=0) return null;
  const months = Math.ceil(bal/monthly);
  const d = new Date(2026, 4+months, 1);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월`;
}

// localStorage 유틸
function load(key, def) { try { const v=localStorage.getItem(key); return v?JSON.parse(v):def; } catch(e){ return def; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }

function App() {
  const [payments,    setPayments]    = useState(()=>load("ld_payments",[]));
  const [planItems,   setPlanItems]   = useState(()=>load("ld_plan", INITIAL_PLAN));
  const [planOverrides,setPlanOverrides]=useState(()=>load("ld_overrides",{}));
  const [targetMonth, setTargetMonth] = useState(()=>load("ld_target","2026-12"));
  const [sliderVal,   setSliderVal]   = useState(1780000);

  const [form,      setForm]      = useState({...EMPTY_FORM});
  const [editingId, setEditingId] = useState(null);
  const [editForm,  setEditForm]  = useState(null);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [showForm,  setShowForm]  = useState(false);
  const [expanded,  setExpanded]  = useState(null);
  const [showPlanForm,setShowPlanForm]=useState(false);
  const [newPlan,   setNewPlan]   = useState({label:"",event:"",type:"goal"});

  // localStorage 동기화
  useEffect(()=>save("ld_payments", payments),   [payments]);
  useEffect(()=>save("ld_plan",     planItems),   [planItems]);
  useEffect(()=>save("ld_overrides",planOverrides),[planOverrides]);
  useEffect(()=>save("ld_target",   targetMonth), [targetMonth]);

  const sim = useMemo(()=>{
    let cardBal=CURRENT_CARD_BAL, cheonBal=CHEON_ORIGIN;
    const rows=[];
    const sorted=[...payments].sort((a,b)=>a.month.localeCompare(b.month));
    for(const p of sorted){
      const cardP=Number(p.cardPrincipal)||0, cardI=Number(p.cardInterest)||0;
      const cheonP=Number(p.cheonPrincipal)||0, cheonI=Number(p.cheonInterest)||CHEON_MONTHLY_INTEREST;
      cardBal=Math.max(0,cardBal-cardP); cheonBal=Math.max(0,cheonBal-cheonP);
      rows.push({id:p.id,month:p.month,cardP,cardI,cheonP,cheonI,cardBal,cheonBal,note:p.note});
    }
    return {rows,cardBal,cheonBal};
  },[payments]);

  const currentMonth="2026-05";
  const monthsLeft=Math.max(1,monthDiff(currentMonth,targetMonth));
  const monthlyNeeded=Math.ceil(sim.cardBal/monthsLeft);
  const sliderComplete=monthsToComplete(sim.cardBal,sliderVal);

  const pastIntCard  = PAST_RECORDS.reduce((a,r)=>a+r.events.reduce((b,e)=>b+(e.interestCard||0),0),0);
  const pastIntCheon = PAST_RECORDS.reduce((a,r)=>a+(r.cheonInterest||0),0);
  const futIntCard   = sim.rows.reduce((a,r)=>a+r.cardI,0);
  const futIntCheon  = sim.rows.reduce((a,r)=>a+r.cheonI,0);
  const totalInterest= pastIntCard+pastIntCheon+futIntCard+futIntCheon;

  const totalOrigin  = 47000000+CHEON_ORIGIN+10000000;
  const totalRemain  = sim.cardBal+sim.cheonBal;
  const overallPct   = ((totalOrigin-totalRemain)/totalOrigin)*100;
  const cardRepaidPct  = ((47000000-sim.cardBal)/47000000)*100;
  const cheonRepaidPct = ((CHEON_ORIGIN-sim.cheonBal)/CHEON_ORIGIN)*100;
  const totalRepaidPct = ((totalOrigin-totalRemain)/totalOrigin)*100;

  function addPayment(){
    const id=`pay-${Date.now()}`;
    setPayments(prev=>{
      const ex=prev.find(p=>p.month===form.month);
      if(ex) return prev.map(p=>p.month===form.month?{...form,id:p.id}:p);
      return [...prev,{...form,id}];
    });
    setForm({...EMPTY_FORM}); setShowForm(false);
  }
  function startEdit(pay){ setEditingId(pay.id); setEditForm({...pay}); }
  function saveEdit(){ setPayments(prev=>prev.map(p=>p.id===editingId?{...editForm}:p)); setEditingId(null); setEditForm(null); }
  function cancelEdit(){ setEditingId(null); setEditForm(null); }
  function removePayment(id){ setPayments(prev=>prev.filter(p=>p.id!==id)); }

  function markComplete(id){ setPlanOverrides(prev=>({...prev,[id]:{...prev[id],completedAt:currentMonth}})); }
  function markSupersede(id){ setPlanOverrides(prev=>({...prev,[id]:{...prev[id],supersededAt:currentMonth}})); }
  function undoPlan(id){ setPlanOverrides(prev=>{ const n={...prev}; delete n[id]; return n; }); }
  function addPlanItem(){
    if(!newPlan.event||!newPlan.label) return;
    setPlanItems(prev=>[...prev,{...newPlan,id:`p-${Date.now()}`,addedAt:currentMonth}]);
    setNewPlan({label:"",event:"",type:"goal"}); setShowPlanForm(false);
  }

  const iStyle=(bc)=>({ width:"100%", background:"#080810", border:`1px solid ${bc}`, color:"#E8E6F0", padding:"8px 11px", borderRadius:8, fontSize:13 });
  const mStyle=(bc)=>({ width:"100%", background:"#080810", border:`1px solid ${bc}`, color:"#E8E6F0", padding:"6px 9px", borderRadius:7, fontSize:12 });

  const interestTimeline=useMemo(()=>{
    const g={};
    PAST_RECORDS.forEach(rec=>{ const ci=rec.events.reduce((a,e)=>a+(e.interestCard||0),0); if(!g[rec.label])g[rec.label]={card:0,cheon:0,locked:true}; g[rec.label].card+=ci; g[rec.label].cheon+=rec.cheonInterest||0; });
    sim.rows.forEach(row=>{ const label=fmtM(row.month); if(!g[label])g[label]={card:0,cheon:0,locked:false}; g[label].card+=row.cardI; g[label].cheon+=row.cheonI; });
    return Object.entries(g);
  },[sim.rows]);

  const tabStyle=(key)=>({ background:activeTab===key?"#ffffff0E":"transparent", border:"none", color:activeTab===key?"#E8E6F0":"#6B6882", padding:"8px 14px", borderRadius:"8px 8px 0 0", cursor:"pointer", fontSize:12, fontWeight:activeTab===key?700:400, borderBottom:activeTab===key?"2px solid #7C6AF7":"2px solid transparent" });

  return (
    <div style={{minHeight:"100vh",background:"#0A0A12"}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#141428,#1A1A3A 60%,#0D2050)",padding:"24px 20px 18px",borderBottom:"1px solid #ffffff0D"}}>
        <div style={{maxWidth:960,margin:"0 auto"}}>
          <div style={{fontSize:10,letterSpacing:4,color:"#7C6AF7",marginBottom:4,textTransform:"uppercase"}}>Financial Recovery Tracker</div>
          <h1 style={{fontSize:23,fontWeight:800,background:"linear-gradient(90deg,#E8E6F0,#9B98BE)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>부채 상환 대시보드</h1>
          <div style={{display:"flex",gap:16,marginTop:7,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#6B6882"}}>2026년 1월 대출 · 5년 8.5%</span>
            <span style={{fontSize:12,color:"#7C6AF7",fontWeight:700}}>잔여 {fmt(totalRemain)}</span>
            <span style={{fontSize:12,color:"#4ECDC4",fontWeight:700}}>{overallPct.toFixed(1)}% 완료</span>
          </div>
        </div>
      </div>

      {/* TABS */}
      <div style={{maxWidth:960,margin:"0 auto",padding:"0 20px"}}>
        <div style={{display:"flex",gap:2,padding:"12px 0 0",borderBottom:"1px solid #ffffff0D"}}>
          {[["dashboard","📊 현황"],["history","📋 상환 기록"],["interest","💸 이자 내역"],["timeline","🗓️ 플랜"]].map(([key,label])=>(
            <button key={key} onClick={()=>setActiveTab(key)} style={tabStyle(key)}>{label}</button>
          ))}
        </div>

        <div style={{padding:"20px 0 60px"}}>

          {/* ══ DASHBOARD ══ */}
          {activeTab==="dashboard" && <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:18}}>
              {[
                {label:"카드론 잔액",    value:fmt(sim.cardBal),   sub:"금리 8.5% / 60개월",           color:"#FF6B6B"},
                {label:"청약예금 대출",  value:fmt(sim.cheonBal),  sub:`월 이자 ${fmt(CHEON_MONTHLY_INTEREST)} 고정`, color:"#4ECDC4"},
                {label:"총 잔여 부채",   value:fmt(totalRemain),   sub:`${overallPct.toFixed(1)}% 완료`, color:"#7C6AF7"},
                {label:"누적 납부 이자", value:fmt(totalInterest), sub:"카드론+청약 합계",              color:"#F9C74F"},
              ].map(c=>(
                <div key={c.label} style={{background:"#141428",borderRadius:13,padding:"15px",border:`1px solid ${c.color}1E`,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:c.color}}/>
                  <div style={{fontSize:10,color:"#6B6882",marginBottom:5}}>{c.label}</div>
                  <div style={{fontSize:17,fontWeight:800,color:c.color}}>{c.value}</div>
                  <div style={{fontSize:10,color:"#6B6882",marginTop:5}}>{c.sub}</div>
                </div>
              ))}
            </div>

            <div style={{background:"#141428",borderRadius:13,padding:"18px 20px",marginBottom:14,border:"1px solid #ffffff08"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#9B98BE",marginBottom:14}}>상환 진행률</div>
              {[
                {label:"카드론 (4,700만 기준)",   initial:47000000,    remain:sim.cardBal,  pct:cardRepaidPct,  color:"#FF6B6B"},
                {label:"청약예금 대출 (700만)",   initial:CHEON_ORIGIN, remain:sim.cheonBal, pct:cheonRepaidPct, color:"#4ECDC4"},
                {label:"총 부채 (적금대출 포함)", initial:totalOrigin,  remain:totalRemain,  pct:totalRepaidPct, color:"#7C6AF7"},
              ].map(bar=>(
                <div key={bar.label} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:12,color:"#C8C5DC"}}>{bar.label}</span>
                    <span style={{fontSize:11,color:"#6B6882"}}>{fmt(bar.remain)} · <span style={{color:bar.color,fontWeight:700}}>{bar.pct.toFixed(1)}%</span></span>
                  </div>
                  <div style={{height:7,background:"#ffffff0B",borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.min(bar.pct,100)}%`,background:`linear-gradient(90deg,${bar.color}55,${bar.color})`,borderRadius:99}}/>
                  </div>
                </div>
              ))}

              <div style={{marginTop:14,padding:"12px 14px",background:"#0A0A12",borderRadius:10,borderLeft:"3px solid #FF6B6B"}}>
                <div style={{fontSize:11,color:"#FF6B6B",fontWeight:700,marginBottom:5}}>📅 카드사 다음 정기 회차</div>
                <div style={{fontSize:12,color:"#A29FBD",lineHeight:1.8}}>
                  <strong style={{color:"#E8E6F0"}}>3회차</strong> · 2026.5.12 · 원금 {fmt(196259)} + 이자 {fmt(105813)} = <strong style={{color:"#FF6B6B"}}>{fmt(302072)}</strong>
                </div>
              </div>

              <div style={{marginTop:12,padding:"16px",background:"#0A0A12",borderRadius:10,borderLeft:"3px solid #7C6AF7"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:11,color:"#7C6AF7",fontWeight:700}}>💡 목표 인사이트</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,color:"#6B6882"}}>목표 완납월</span>
                    <select value={targetMonth} onChange={e=>setTargetMonth(e.target.value)}
                      style={{background:"#141428",border:"1px solid #7C6AF740",color:"#E8E6F0",padding:"4px 8px",borderRadius:6,fontSize:11,cursor:"pointer"}}>
                      {TARGET_MONTH_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                  <div style={{background:"#141428",borderRadius:9,padding:"10px 12px"}}>
                    <div style={{fontSize:10,color:"#6B6882",marginBottom:4}}>목표 완납월</div>
                    <div style={{fontSize:15,fontWeight:800,color:"#7C6AF7"}}>{fmtM(targetMonth)}</div>
                    <div style={{fontSize:10,color:"#555370",marginTop:2}}>{monthsLeft}개월 남음</div>
                  </div>
                  <div style={{background:"#141428",borderRadius:9,padding:"10px 12px"}}>
                    <div style={{fontSize:10,color:"#6B6882",marginBottom:4}}>월 필요 상환액</div>
                    <div style={{fontSize:15,fontWeight:800,color:"#FF6B6B"}}>{fmt(monthlyNeeded)}</div>
                    <div style={{fontSize:10,color:"#555370",marginTop:2}}>잔액 {fmt(sim.cardBal)} 기준</div>
                  </div>
                </div>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontSize:11,color:"#A29FBD",fontWeight:600}}>상환액 시뮬레이터</span>
                    <span style={{fontSize:13,fontWeight:800,color:"#FF6B6B"}}>{fmt(sliderVal)}</span>
                  </div>
                  <input type="range" min={0} max={2500000} step={10000} value={sliderVal} onChange={e=>setSliderVal(Number(e.target.value))}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#555370",marginTop:4}}>
                    <span>0원</span><span>125만</span><span>250만원</span>
                  </div>
                  <div style={{marginTop:12,padding:"10px 14px",background:"#141428",borderRadius:9,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:12,color:"#A29FBD"}}>월 <strong style={{color:"#FF6B6B"}}>{fmt(sliderVal)}</strong> 상환 시</span>
                    <span style={{fontSize:13,fontWeight:800,color:sliderVal===0?"#555370":"#4ECDC4"}}>{sliderVal===0?"상환 불가":`${sliderComplete} 완납`}</span>
                  </div>
                </div>
                <div style={{marginTop:10,fontSize:11,color:"#6B6882",lineHeight:1.7}}>
                  청약 이자 <strong style={{color:"#4ECDC4"}}>월 {fmt(CHEON_MONTHLY_INTEREST)}</strong> 고정 · 카드론 완전 상환 후 청약 700 정리 예정
                </div>
              </div>
            </div>
            <div style={{textAlign:"center"}}>
              <button onClick={()=>{setActiveTab("history");setShowForm(true);}} style={{background:"linear-gradient(135deg,#7C6AF7,#5B4CF5)",border:"none",color:"#fff",padding:"12px 28px",borderRadius:12,cursor:"pointer",fontSize:13,fontWeight:700,boxShadow:"0 4px 18px #7C6AF740"}}>+ 이번 달 상환 내역 추가</button>
            </div>
          </div>}

          {/* ══ HISTORY ══ */}
          {activeTab==="history" && <div>
            <div style={{marginBottom:24}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <span style={{fontSize:13,fontWeight:700,color:"#9B98BE"}}>🔒 확정 상환 내역 (2~4월)</span>
                <span style={{fontSize:10,color:"#4ECDC4",background:"#4ECDC418",padding:"3px 9px",borderRadius:99,fontWeight:700}}>완료</span>
              </div>
              {PAST_RECORDS.map(rec=>{
                const isOpen=expanded===rec.id;
                const tcp=rec.events.reduce((a,e)=>a+(e.principalCard||0),0);
                const tci=rec.events.reduce((a,e)=>a+(e.interestCard||0),0);
                const top=rec.events.reduce((a,e)=>a+(e.principalOther||0),0);
                return (

                ["연금저축","300만원 → 총급여 5,500 이하 49.5만 / 초과 39.6만원"],

                ["청약 700","카드론 완전 상환 후 / 월이자 23,602원 고정"],
              ].map(([k,v])=>(
                <div key={k} style={{display:"flex",gap:12,marginBottom:9,alignItems:"flex-start"}}>
                  <span style={{fontSize:10,color:"#6B6882",minWidth:80,marginTop:2,lineHeight:1.6}}>{k}</span>
                  <span style={{fontSize:12,color:"#C8C5DC",lineHeight:1.7}}>{v}</span>
                </div>
              ))}
            </div>
          </div>}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
